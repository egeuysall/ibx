name: Release CLI

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip cli-release]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force

      - name: Resolve next CLI version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          current="$(node -e "const v=require('./cli/package.json').version;if(!/^\\d+\\.\\d+\\.\\d+$/.test(v)) process.exit(1); process.stdout.write(v)")"
          IFS=. read -r major minor patch <<<"${current}"
          version="${current}"
          tag="v${version}"

          while git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; do
            patch="$((patch + 1))"
            version="${major}.${minor}.${patch}"
            tag="v${version}"
          done

          node - "${version}" <<'NODE'
          const fs = require("fs");
          const version = process.argv[2];
          const packagePath = "cli/package.json";
          const constantsPath = "cli/src/core/constants.ts";

          const pkg = JSON.parse(fs.readFileSync(packagePath, "utf8"));
          pkg.version = version;
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);

          const constants = fs.readFileSync(constantsPath, "utf8");
          fs.writeFileSync(
            constantsPath,
            constants.replace(/export const VERSION = ".*?";/, `export const VERSION = "${version}";`),
          );
          NODE

          bun run cli:build
          bun run cli:bundle

          if ! git diff --quiet -- cli/package.json cli/src/core/constants.ts public/ibx public/ibx-version.json; then
            git add cli/package.json cli/src/core/constants.ts public/ibx public/ibx-version.json
            git commit -m "chore(cli): release ${version} [skip cli-release]"
          fi

          git tag "${tag}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
          git push origin "${tag}"

          echo "version=${version}" >>"${GITHUB_OUTPUT}"
          echo "tag=${tag}" >>"${GITHUB_OUTPUT}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ steps.version.outputs.tag }}" \
            public/ibx \
            --repo "${GITHUB_REPOSITORY}" \
            --title "ibx ${{ steps.version.outputs.tag }}" \
            --generate-notes
